<svg width="480" height="452" viewBox="0 0 480 452" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Reserved Seating Management</title>
  <desc>A flowchart showing the 5-step reserved seating management process</desc>

  <rect x="0" y="0" width="480" height="452" rx="16" fill="#FEF3DC"/>
  <text x="36" y="44" font-family="Georgia, serif" font-size="17" font-weight="700" fill="#2C2C2A">Reserved Seating Management</text>

  <rect x="36" y="68" width="408" height="48" rx="10" fill="#FEF3DC" stroke="#D3CDB8" stroke-width="1.2"/>
  <text x="240" y="97" font-family="Georgia, serif" font-size="15" fill="#5F5E5A" text-anchor="middle" dominant-baseline="central">Reserved Seating Settings</text>
  <line x1="240" y1="116" x2="240" y2="129" stroke="#6B67C4" stroke-width="1.5"/>
  <polygon points="234,129 246,129 240,141" fill="#6B67C4"/>

  <rect x="36" y="144" width="408" height="48" rx="10" fill="#FEF3DC" stroke="#D3CDB8" stroke-width="1.2"/>
  <text x="240" y="173" font-family="Georgia, serif" font-size="15" fill="#5F5E5A" text-anchor="middle" dominant-baseline="central">Select/Create Seat Map</text>
  <line x1="240" y1="192" x2="240" y2="205" stroke="#6B67C4" stroke-width="1.5"/>
  <polygon points="234,205 246,205 240,217" fill="#6B67C4"/>

  <rect x="36" y="220" width="408" height="48" rx="10" fill="#FEF3DC" stroke="#D3CDB8" stroke-width="1.2"/>
  <text x="240" y="249" font-family="Georgia, serif" font-size="15" fill="#5F5E5A" text-anchor="middle" dominant-baseline="central">Configure Pricing Tiers</text>
  <line x1="240" y1="268" x2="240" y2="281" stroke="#6B67C4" stroke-width="1.5"/>
  <polygon points="234,281 246,281 240,293" fill="#6B67C4"/>

  <rect x="36" y="296" width="408" height="62" rx="10" fill="#FEF3DC" stroke="#D3CDB8" stroke-width="1.2"/>
  <text x="240" y="320" font-family="Georgia, serif" font-size="14.5" fill="#5F5E5A" text-anchor="middle">Manage Seat Status: Available,</text>
  <text x="240" y="340" font-family="Georgia, serif" font-size="14.5" fill="#5F5E5A" text-anchor="middle">Reserved, Blocked, Sold</text>
  <line x1="240" y1="358" x2="240" y2="371" stroke="#6B67C4" stroke-width="1.5"/>
  <polygon points="234,371 246,371 240,383" fill="#6B67C4"/>

  <rect x="36" y="386" width="408" height="34" rx="10" fill="#FEF3DC" stroke="#D3CDB8" stroke-width="1.2"/>
  <text x="240" y="408" font-family="Georgia, serif" font-size="15" fill="#5F5E5A" text-anchor="middle" dominant-baseline="central">Save Configuration</text>
</svg>
