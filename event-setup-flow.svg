<svg width="480" height="600" viewBox="0 0 480 600" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Event Setup Flow</title>
  <desc>A flowchart showing the 7-step event setup process</desc>

  <rect x="0" y="0" width="480" height="600" rx="16" fill="#FEF3DC"/>
  <text x="36" y="44" font-family="Georgia, serif" font-size="17" font-weight="700" fill="#2C2C2A">Event Setup Flow</text>

  <rect x="36" y="60" width="408" height="48" rx="10" fill="#FEF3DC" stroke="#D3CDB8" stroke-width="1.2"/>
  <text x="240" y="89" font-family="Georgia, serif" font-size="15" fill="#5F5E5A" text-anchor="middle" dominant-baseline="central">Create Event</text>
  <line x1="240" y1="108" x2="240" y2="121" stroke="#6B67C4" stroke-width="1.5"/>
  <polygon points="234,121 246,121 240,133" fill="#6B67C4"/>

  <rect x="36" y="136" width="408" height="48" rx="10" fill="#FEF3DC" stroke="#D3CDB8" stroke-width="1.2"/>
  <text x="240" y="165" font-family="Georgia, serif" font-size="15" fill="#5F5E5A" text-anchor="middle" dominant-baseline="central">Add Ticketing</text>
  <line x1="240" y1="184" x2="240" y2="197" stroke="#6B67C4" stroke-width="1.5"/>
  <polygon points="234,197 246,197 240,209" fill="#6B67C4"/>

  <rect x="36" y="212" width="408" height="48" rx="10" fill="#FEF3DC" stroke="#D3CDB8" stroke-width="1.2"/>
  <text x="240" y="241" font-family="Georgia, serif" font-size="15" fill="#5F5E5A" text-anchor="middle" dominant-baseline="central">Choose Ticket Type</text>
  <line x1="240" y1="260" x2="240" y2="273" stroke="#6B67C4" stroke-width="1.5"/>
  <polygon points="234,273 246,273 240,285" fill="#6B67C4"/>

  <rect x="36" y="288" width="408" height="62" rx="10" fill="#FEF3DC" stroke="#D3CDB8" stroke-width="1.2"/>
  <text x="240" y="312" font-family="Georgia, serif" font-size="14.5" fill="#5F5E5A" text-anchor="middle">Select: General Admission or</text>
  <text x="240" y="332" font-family="Georgia, serif" font-size="14.5" fill="#5F5E5A" text-anchor="middle">Reserved Seating</text>
  <line x1="240" y1="350" x2="240" y2="363" stroke="#6B67C4" stroke-width="1.5"/>
  <polygon points="234,363 246,363 240,375" fill="#6B67C4"/>

  <rect x="36" y="378" width="408" height="48" rx="10" fill="#FEF3DC" stroke="#D3CDB8" stroke-width="1.2"/>
  <text x="240" y="407" font-family="Georgia, serif" font-size="15" fill="#5F5E5A" text-anchor="middle" dominant-baseline="central">Select Seat Map</text>
  <line x1="240" y1="426" x2="240" y2="439" stroke="#6B67C4" stroke-width="1.5"/>
  <polygon points="234,439 246,439 240,451" fill="#6B67C4"/>

  <rect x="36" y="454" width="408" height="48" rx="10" fill="#FEF3DC" stroke="#D3CDB8" stroke-width="1.2"/>
  <text x="240" y="483" font-family="Georgia, serif" font-size="15" fill="#5F5E5A" text-anchor="middle" dominant-baseline="central">Configure Ticket Types</text>
  <line x1="240" y1="502" x2="240" y2="515" stroke="#6B67C4" stroke-width="1.5"/>
  <polygon points="234,515 246,515 240,527" fill="#6B67C4"/>

  <rect x="36" y="530" width="408" height="38" rx="10" fill="#FEF3DC" stroke="#D3CDB8" stroke-width="1.2"/>
  <text x="240" y="554" font-family="Georgia, serif" font-size="15" fill="#5F5E5A" text-anchor="middle" dominant-baseline="central">Publish Event</text>
</svg>
